<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>דשבורד רמב"ן - גרסה 2</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <header class="topbar">
      <h1>דשבורד מחקרי רמב"ן - גרסה 2</h1>
      <p>כלי חקירה דו-כיווני: ממקור למסקנה, וממסקנה למקור.</p>
    </header>

    <nav class="tabs" aria-label="ניווט ראשי">
      <button class="tab is-active" data-tab="by-source">לפי מקור</button>
      <button class="tab" data-tab="by-commentator">לפי פרשן</button>
      <button class="tab" data-tab="flow-atlas">אטלס זרימות</button>
      <button class="tab" data-tab="overview">מבט כללי / אשכולות</button>
      <button class="tab" data-tab="corpus-analysis">ניתוח קורפוס</button>
      <button class="tab" data-tab="data-archive">ארכיון נתונים / ממצאים</button>
    </nav>

    <main id="app" class="layout">
      <section id="view-by-source" class="view is-active"></section>
      <section id="view-by-commentator" class="view"></section>
      <section id="view-flow-atlas" class="view"></section>
      <section id="view-overview" class="view"></section>
      <section id="view-corpus-analysis" class="view"></section>
      <section id="view-data-archive" class="view"></section>
    </main>

    <script src="./data/data-index.js"></script>
    <script>
      window.RAMBAN_V2_SECTIONS = window.RAMBAN_V2_SECTIONS || {};
      window.RAMBAN_V2_COMMENTATORS = window.RAMBAN_V2_COMMENTATORS || {};
    </script>
    <script src="./js/data-loader.js"></script>
    <script src="./js/graph-view.js"></script>
    <script src="./js/tables.js"></script>
    <script src="./js/text-view.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
